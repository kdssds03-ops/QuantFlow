# ────────────────────────────────────────────────────────────
# QuantFlow — Alembic 설정 파일
# ────────────────────────────────────────────────────────────
# 참고: sqlalchemy.url은 entrypoint-api.sh가 DATABASE_URL 환경변수로부터
#       자동 주입합니다. 아래 기본값은 로컬 직접 실행용 폴백입니다.
# ────────────────────────────────────────────────────────────

[alembic]
# 마이그레이션 파일 저장 경로
script_location = alembic

# 리비전 파일명 포맷: 날짜-시간_설명.py (추적 편의성)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Docker 컨테이너 내 DB URL (entrypoint가 환경변수로 덮어씀)
# asyncpg 대신 psycopg2 사용 (Alembic은 동기 드라이버 필요)
sqlalchemy.url = postgresql+psycopg2://quantflow:quantflow_secret@postgres:5432/quantflow

# 로컬 개발 시 직접 실행할 경우: DATABASE_URL 환경변수로 재정의
# 예: DATABASE_URL=postgresql+psycopg2://... alembic upgrade head

[post_write_hooks]
# 생성된 리비전 파일에 black 포맷터 자동 적용 (선택사항)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
